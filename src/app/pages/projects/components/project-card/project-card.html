<div class="project-card">
  <div class="project-card__header">
    <img [ngSrc]="'/assets/img/' + projectData()?.image" alt="project" fill>
    <div class="project-card__header__overlay">
      <div class="project-card__header__overlay__links">
        <a
          class="project-card__header__overlay__link"
          [href]="projectData()?.githubLink"
          target="_blank"
          aria-label="GitHub repository"
        >
          <fa-icon [icon]="faGithub" size="lg" title="Github"></fa-icon>
        </a>
        @if (projectData()?.externalLink) {
          <a
            class="project-card__header__overlay__link"
            [href]="projectData()?.externalLink"
            target="_blank"
            aria-label="View live project"
          >
            <fa-icon [icon]="faArrowUpRightFromSquare" size="lg" title="External"></fa-icon>
          </a>
        }
      </div>
    </div>
  </div>
  <div class="project-card__body">
    <h3 class="project-card__body__title">{{ projectData()?.title }}</h3>
    <p class="project-card__body__description">{{ projectData()?.description }}</p>
    <div class="project-card__body__skills">
      @for (skill of projectData()?.skills; track $index) {
        <app-chip [label]="skill" />
      }
    </div>
  </div>
</div>
